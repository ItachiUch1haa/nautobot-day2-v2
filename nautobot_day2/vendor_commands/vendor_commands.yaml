# vendor_commands.yaml
# =====================================================================
# CLI and API command map for multi-vendor network sync
# =====================================================================
# Structure:
#   switches/      — SSH-based sync for network switches
#   access_points/ — SSH or API-based sync for APs
#   firewalls/     — SSH-based sync for firewalls
#
# To add a new vendor: copy the template block and fill in.
# No Python code changes needed — the sync script reads this file.
#
# Vendor matrix alignment (vendor_matrix.py platform slugs):
#   arubaos        → switches/aruba_os
#   arubaoscx      → switches/aruba_aoscx
#   junos          → switches/juniper_junos
#   iosxe          → switches/cisco_iosxe
#   ios            → switches/cisco_ios
#   nxos           → switches/cisco_nxos
#   fortios-switch → switches/fortinet_switch
#   arubaos (ap)   → access_points/aruba_ap_aos10 (SSH) or aruba_ap_central_api (API)
#   junos (ap)     → access_points/juniper_mist_ap
#   fortios-ap     → access_points/fortinet_ap or fortinet_ap_manager_api
#   clearpass      → access_points/aruba_clearpass_api
#   fortios        → firewalls/fortios
#   junos-srx      → firewalls/juniper_srx
#   asa            → firewalls/cisco_asa
#   ftd            → firewalls/cisco_ftd (SSH) or cisco_fmc_api (API)
# =====================================================================


# =====================================================================
# SWITCHES — SSH sync
# =====================================================================

switches:

  aruba_os:
    # Aruba AOS (2930, 3810 series — KB.16.xx firmware)
    # Netmiko driver: aruba_os
    netmiko_device_type : "aruba_os"
    secrets_group       : "aruba-ssh"
    disable_paging      : "terminal length 0"
    data_source         : "ssh"
    commands:
      vlans             : "show vlans"
      interfaces        : "show interfaces brief"
      ip_interfaces     : "show ip interface brief"
      lldp_neighbors    : "show lldp info remote-device all"
      version           : "show version"
      mac_table         : "show mac-address"
      system_info       : "show system information"
    parsers:
      vlans:
        type            : "regex"
        columns         : ["vlan_id", "name", "status", "ports"]
        header_skip     : 2
      interfaces:
        type            : "regex"
        columns         : ["port", "type", "enabled", "link", "speed", "duplex", "vlan", "mode"]
        header_skip     : 3
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "subnet_mask", "status"]
        header_skip     : 2
      lldp_neighbors:
        type            : "regex"
        columns         : ["local_port", "chassis_id", "port_id", "system_name", "system_descr"]
        header_skip     : 3

  aruba_aoscx:
    # Aruba AOS-CX (6200, 6300, 8325 series)
    # Netmiko driver: aruba_aoscx
    netmiko_device_type : "aruba_aoscx"
    secrets_group       : "aruba-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      vlans             : "show vlan"
      interfaces        : "show interface brief"
      ip_interfaces     : "show ip interface brief"
      lldp_neighbors    : "show lldp neighbor-info"
      version           : "show version"
      mac_table         : "show mac-address-table"
    parsers:
      vlans:
        type            : "regex"
        columns         : ["vlan_id", "name", "status", "reason"]
        header_skip     : 2
      interfaces:
        type            : "regex"
        columns         : ["interface", "admin_state", "link_state", "speed", "duplex", "vlan", "type"]
        header_skip     : 2
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "prefix_len", "admin", "state", "type"]
        header_skip     : 2
      lldp_neighbors:
        type            : "regex"
        # LOCAL-PORT  CHASSIS-ID  PORT-ID  PORT-DESC  TTL  SYS-NAME
        columns         : ["local_port", "chassis_id", "port_id", "port_desc", "ttl", "system_name"]
        header_skip     : 3

  juniper_junos:
    # Juniper EX series switches
    # Netmiko driver: juniper_junos
    netmiko_device_type : "juniper_junos"
    secrets_group       : "juniper-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      vlans             : "show vlans"
      interfaces        : "show interfaces terse"
      ip_interfaces     : "show interfaces routing"
      lldp_neighbors    : "show lldp neighbors"
      version           : "show version"
      mac_table         : "show ethernet-switching table"
      chassis_hardware  : "show chassis hardware"
    parsers:
      vlans:
        type            : "regex"
        columns         : ["name", "tag", "interfaces"]
        header_skip     : 1
      interfaces:
        type            : "regex"
        columns         : ["interface", "admin", "link", "proto", "local", "remote"]
        header_skip     : 1
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "prefix_len"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        # Local Interface  Parent Interface  Chassis Id  Port info  System Name
        columns         : ["local_port", "parent_interface", "chassis_id", "port_id", "system_name"]
        header_skip     : 1

  cisco_iosxe:
    # Cisco IOS-XE (Catalyst 9200, 9300, 9400 series)
    # Netmiko driver: cisco_ios
    # Note: uses CDP as primary neighbor discovery, LLDP as fallback
    # Note: enable mode may be required — set CISCO_ENABLE_PASS in env
    netmiko_device_type : "cisco_ios"
    secrets_group       : "cisco-ssh"
    disable_paging      : "terminal length 0"
    data_source         : "ssh"
    commands:
      vlans             : "show vlan brief"
      interfaces        : "show interfaces status"
      ip_interfaces     : "show ip interface brief"
      lldp_neighbors    : "show lldp neighbors detail"
      cdp_neighbors     : "show cdp neighbors detail"
      version           : "show version"
      mac_table         : "show mac address-table"
    parsers:
      vlans:
        type            : "regex"
        # VLAN  Name  Status  Ports
        columns         : ["vlan_id", "name", "status", "ports"]
        header_skip     : 2
      interfaces:
        type            : "regex"
        # Port  Name  Status  Vlan  Duplex  Speed  Type
        columns         : ["port", "name", "status", "vlan", "duplex", "speed", "type"]
        header_skip     : 2
      ip_interfaces:
        type            : "regex"
        # Interface  IP-Address  OK?  Method  Status  Protocol
        columns         : ["interface", "ip_address", "ok", "method", "status", "protocol"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        columns         : ["system_name", "local_port", "port_id", "system_descr",
                           "mgmt_address", "capabilities"]
        header_skip     : 0
      cdp_neighbors:
        type            : "regex"
        # Device ID  Local Intf  Holdtme  Capability  Platform  Port ID
        columns         : ["device_id", "local_port", "holdtime", "capability",
                           "platform", "remote_port"]
        header_skip     : 0

  cisco_ios:
    # Cisco IOS (Catalyst 2960, 3560, 3750 series)
    # Netmiko driver: cisco_ios — same driver as IOS-XE
    # Note: older IOS may not support LLDP — CDP is primary
    netmiko_device_type : "cisco_ios"
    secrets_group       : "cisco-ssh"
    disable_paging      : "terminal length 0"
    data_source         : "ssh"
    commands:
      vlans             : "show vlan brief"
      interfaces        : "show interfaces status"
      ip_interfaces     : "show ip interface brief"
      lldp_neighbors    : "show lldp neighbors detail"
      cdp_neighbors     : "show cdp neighbors detail"
      version           : "show version"
      mac_table         : "show mac address-table"
    parsers:
      vlans:
        type            : "regex"
        columns         : ["vlan_id", "name", "status", "ports"]
        header_skip     : 2
      interfaces:
        type            : "regex"
        columns         : ["port", "name", "status", "vlan", "duplex", "speed", "type"]
        header_skip     : 2
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "ok", "method", "status", "protocol"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        columns         : ["system_name", "local_port", "port_id", "system_descr",
                           "mgmt_address", "capabilities"]
        header_skip     : 0
      cdp_neighbors:
        type            : "regex"
        columns         : ["device_id", "local_port", "holdtime", "capability",
                           "platform", "remote_port"]
        header_skip     : 0

  cisco_nxos:
    # Cisco NX-OS (Nexus 5K, 7K, 9K series)
    # Netmiko driver: cisco_nxos
    netmiko_device_type : "cisco_nxos"
    secrets_group       : "cisco-ssh"
    disable_paging      : "terminal length 0"
    data_source         : "ssh"
    commands:
      vlans             : "show vlan brief"
      interfaces        : "show interface status"
      ip_interfaces     : "show ip interface brief"
      lldp_neighbors    : "show lldp neighbors detail"
      cdp_neighbors     : "show cdp neighbors detail"
      version           : "show version"
      mac_table         : "show mac address-table"
    parsers:
      vlans:
        type            : "regex"
        columns         : ["vlan_id", "name", "status", "ports"]
        header_skip     : 2
      interfaces:
        type            : "regex"
        columns         : ["port", "name", "status", "vlan", "duplex", "speed", "type"]
        header_skip     : 2
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "ok", "method", "status", "protocol"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        columns         : ["system_name", "local_port", "port_id", "system_descr",
                           "mgmt_address", "capabilities"]
        header_skip     : 0
      cdp_neighbors:
        type            : "regex"
        columns         : ["device_id", "local_port", "holdtime", "capability",
                           "platform", "remote_port"]
        header_skip     : 0

  fortinet_switch:
    # Fortinet FortiSwitch (managed via FortiLink or standalone SSH)
    # Netmiko driver: fortinet
    # Note: FortiSwitch CLI is similar to FortiGate — switch-specific cmds
    # Note: LLDP enabled by default on FortiSwitch
    netmiko_device_type : "fortinet"
    secrets_group       : "fortinet-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      vlans             : "get switch vlan list"
      interfaces        : "get switch interface list"
      ip_interfaces     : "get switch interface detail"
      lldp_neighbors    : "diagnose switch lldp neighbors-summary"
      lldp_detail       : "diagnose switch lldp neighbors-detail"
      version           : "get system status"
      mac_table         : "diagnose switch mac list"
    parsers:
      vlans:
        type            : "regex"
        columns         : ["vlan_id", "name", "description"]
        header_skip     : 1
      interfaces:
        type            : "regex"
        columns         : ["interface", "vlan", "type", "status"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        columns         : ["local_port", "chassis_id", "port_id", "system_name", "capabilities"]
        header_skip     : 1

