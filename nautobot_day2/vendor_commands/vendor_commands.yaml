# =====================================================================
# FIREWALLS — SSH and API sync
# =====================================================================

firewalls:

  fortios:
    # Fortinet FortiGate — FortiOS SSH
    # Netmiko driver: fortinet
    # Note: LLDP must be enabled globally first:
    #   config system global
    #     set lldp-reception enable
    #     set lldp-transmission enable
    #   end
    netmiko_device_type : "fortinet"
    secrets_group       : "fortinet-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      version           : "get system status"
      interfaces        : "get system interface"
      routing_table     : "get router info routing-table all"
      arp_table         : "get system arp"
      lldp_neighbors    : "diagnose lldprx neighbor summary"
      lldp_detail       : "diagnose lldprx neighbor details"
      ha_status         : "get system ha status"
      vdom_list         : "show system vdom"
    parsers:
      interfaces:
        type            : "regex"
        # == [port1] ==
        # ip: 10.0.0.1 255.255.255.0
        # status: up
        columns         : ["interface", "ip", "mask", "status", "type"]
        header_skip     : 0
      lldp_neighbors:
        type            : "regex"
        # <index> port '<local_port>' <ttl> mac <chassis_mac> chassis <chassis_id>
        columns         : ["index", "local_port", "ttl", "chassis_mac",
                           "chassis_id", "remote_port", "system_name"]
        header_skip     : 0
      lldp_detail:
        type            : "regex"
        columns         : ["key", "value"]
        header_skip     : 0

  juniper_srx:
    # Juniper SRX series firewalls
    # Netmiko driver: juniper_junos — same as EX switches
    # Note: same Junos CLI, SRX-specific security zone commands added
    netmiko_device_type : "juniper_junos"
    secrets_group       : "juniper-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      version           : "show version"
      interfaces        : "show interfaces terse"
      ip_interfaces     : "show interfaces routing"
      lldp_neighbors    : "show lldp neighbors"
      routing_table     : "show route"
      security_zones    : "show security zones"
      arp_table         : "show arp"
    parsers:
      interfaces:
        type            : "regex"
        columns         : ["interface", "admin", "link", "proto", "local", "remote"]
        header_skip     : 1
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "prefix_len"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        columns         : ["local_port", "parent_interface", "chassis_id",
                           "port_id", "system_name"]
        header_skip     : 1
      routing_table:
        type            : "regex"
        columns         : ["destination", "protocol", "preference",
                           "metric", "next_hop", "interface"]
        header_skip     : 2

  cisco_asa:
    # Cisco ASA firewall (5506, 5508, 5516 series)
    # Netmiko driver: cisco_asa
    # Note: ASA uses 'terminal pager 0' not 'terminal length 0'
    # Note: enable mode required — set CISCO_ENABLE_PASS_<SLUG> in env
    netmiko_device_type : "cisco_asa"
    secrets_group       : "cisco-ssh"
    disable_paging      : "terminal pager 0"
    data_source         : "ssh"
    commands:
      version           : "show version"
      interfaces        : "show interface"
      ip_interfaces     : "show ip address"
      lldp_neighbors    : "show lldp neighbors detail"
      routing_table     : "show route"
      arp_table         : "show arp"
      nameif            : "show nameif"
    parsers:
      interfaces:
        type            : "regex"
        columns         : ["interface", "status", "protocol", "description"]
        header_skip     : 0
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "subnet_mask", "method"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        columns         : ["system_name", "local_port", "port_id",
                           "system_descr", "mgmt_address"]
        header_skip     : 0
      routing_table:
        type            : "regex"
        columns         : ["code", "network", "mask", "via", "interface"]
        header_skip     : 0

  cisco_ftd:
    # Cisco FTD (Firepower Threat Defense) — direct SSH
    # Netmiko driver: cisco_ftd
    # Note: FTD has limited CLI vs ASA — use FMC API for full config data
    # Note: clish mode used for basic show commands
    netmiko_device_type : "cisco_ftd"
    secrets_group       : "cisco-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      version           : "show version"
      interfaces        : "show interface"
      ip_interfaces     : "show ip address"
      routing_table     : "show route"
      lldp_neighbors    : "show lldp neighbors detail"
    parsers:
      interfaces:
        type            : "regex"
        columns         : ["interface", "status", "protocol", "description"]
        header_skip     : 0
      ip_interfaces:
        type            : "regex"
        columns         : ["interface", "ip_address", "subnet_mask", "method"]
        header_skip     : 1
      lldp_neighbors:
        type            : "regex"
        columns         : ["system_name", "local_port", "port_id",
                           "system_descr", "mgmt_address"]
        header_skip     : 0

  cisco_fmc_api:
    # Cisco FMC (Firepower Management Center) — REST API
    # Used for FTD devices managed by FMC
    # Reference: FMC REST API v6.7+
    data_source         : "api"
    api_type            : "cisco_fmc"
    secrets_group       : "cisco-fmc-api"
    api_endpoints:
      devices           : "/api/fmc_config/v1/domain/{domain_uuid}/devices/devicerecords"
      interfaces        : "/api/fmc_config/v1/domain/{domain_uuid}/devices/devicerecords/{device_uuid}/physicalinterfaces"
      routing           : "/api/fmc_config/v1/domain/{domain_uuid}/devices/devicerecords/{device_uuid}/routing/ipv4staticroutes"
      status            : "/api/fmc_platform/v1/info/serverversion"

