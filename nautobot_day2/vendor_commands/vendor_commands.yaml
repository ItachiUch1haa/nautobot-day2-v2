# =====================================================================
# ACCESS POINTS — SSH and API sync
# =====================================================================

access_points:

  aruba_ap_aos10:
    # Aruba Instant AP (AOS-10) — standalone SSH mode
    # Model: AP-505, AP-515, AP-535, AP-555 etc.
    # Note: LLDP command differs from switch — uses 'show ap debug lldp'
    # Note: AP reports its uplink switch as the LLDP neighbor
    netmiko_device_type : "aruba_os"
    secrets_group       : "aruba-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      version           : "show version"
      interfaces        : "show interface"
      lldp_neighbors    : "show ap debug lldp neighbor"
      lldp_detail       : "show ap debug lldp info"
      uplink            : "show uplink"
    parsers:
      interfaces:
        type            : "regex"
        columns         : ["interface", "status", "protocol", "hw_type", "mac"]
        header_skip     : 0
      lldp_neighbors:
        type            : "regex"
        columns         : ["interface", "neighbor_id", "capabilities",
                           "remote_interface", "expiry_time"]
        header_skip     : 2
      lldp_detail:
        type            : "regex"
        columns         : ["ap_name", "interface_name", "neighbor_id", "remote_interface",
                           "mau", "power_supply", "neighbor_vlan", "neighbor_basemac",
                           "neighbor_hostname", "neighbor_capability", "management_address",
                           "firmware_version", "power_request", "power_allocated",
                           "enabled_capability"]
        header_skip     : 1

  aruba_ap_central_api:
    # Aruba AP — managed via Aruba Central API (cloud-managed)
    # Primary method when APs are managed by Aruba Central
    # API endpoint: /monitoring/v2/aps
    data_source         : "api"
    api_type            : "aruba_central"
    secrets_group       : "aruba-central-api"
    credential_rotates  : true
    api_endpoints:
      devices           : "/monitoring/v2/aps"
      lldp_neighbors    : "/monitoring/v1/aps/{serial}/neighbors"
      interfaces        : "/monitoring/v2/aps/{serial}/ports"
      clients           : "/monitoring/v2/aps/{serial}/clients"
      rf_summary        : "/monitoring/v2/aps/{serial}/radio_summary"

  juniper_mist_ap:
    # Juniper Mist AP — cloud-only, NO SSH support
    # All data fetched via Mist Cloud API
    # Reference: https://api.mist.com/api/v1/
    data_source         : "api"
    api_type            : "juniper_mist"
    secrets_group       : "juniper-mist-api"
    api_endpoints:
      devices           : "/sites/{site_id}/devices"
      lldp_neighbors    : "/sites/{site_id}/devices/{device_id}/lldp_neighbors"
      clients           : "/sites/{site_id}/stats/clients"
      events            : "/sites/{site_id}/devices/events"
      stats             : "/sites/{site_id}/stats/devices"

  fortinet_ap_ssh:
    # Fortinet FortiAP — direct SSH fallback
    # Used when FortiManager is unavailable
    # Note: Most FortiAP data comes via FortiManager API (preferred)
    netmiko_device_type : "fortinet"
    secrets_group       : "fortinet-ssh"
    disable_paging      : ""
    data_source         : "ssh"
    commands:
      version           : "get system status"
      interfaces        : "get system interface"
      lldp_neighbors    : "diagnose lldprx neighbor summary"
      ap_status         : "get wireless-controller wtp"
    parsers:
      interfaces:
        type            : "regex"
        columns         : ["interface", "ip", "mask", "status", "type"]
        header_skip     : 0
      lldp_neighbors:
        type            : "regex"
        columns         : ["index", "local_port", "ttl", "chassis_mac",
                           "chassis_id", "remote_port", "system_name"]
        header_skip     : 0

  fortinet_ap_manager_api:
    # Fortinet FortiAP — managed via FortiManager API (preferred)
    # Reference: FortiManager API v7.x
    data_source         : "api"
    api_type            : "fortinet_manager"
    secrets_group       : "fortinet-manager-api"
    api_endpoints:
      devices           : "/dvmdb/device"
      ap_list           : "/wireless/ap"
      interfaces        : "/pm/config/device/{device}/global/system/interface"
      lldp_neighbors    : "/pm/config/device/{device}/global/system/lldp/network-policy"
      status            : "/sys/status"

  aruba_clearpass_api:
    # Aruba ClearPass NAC — API only (no useful SSH CLI for sync)
    # Reference: ClearPass REST API v6.x
    data_source         : "api"
    api_type            : "aruba_clearpass"
    secrets_group       : "aruba-clearpass-api"
    api_endpoints:
      endpoints         : "/api/endpoint"
      network_devices   : "/api/network-device"
      policy_servers    : "/api/server/configuration/summary"
      active_sessions   : "/api/session"

  # -----------------------------------------------------------------------
