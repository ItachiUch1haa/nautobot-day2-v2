---
# Aruba 3810M / HP ProCurve — handles stacked and standalone
# Netmiko driver: hp_procurve
# Tested: JL075A 3810M-16SFP+ KB.16.11.0013 (2-member stack)
sync_devices:
  hostname:
    commands:
      - command: "show system"
        parser: "textfsm"
        jpath: "[*].name"
  serial:
    commands:
      - command: "show system | include Serial"
        parser: "ttp"
        jpath: "[0].serials"
        post_processor: "{% if obj is iterable and obj is not string %}{{ obj[0].serial | trim }}{% else %}{{ obj.serial | trim }}{% endif %}"
        iterable_type: "str"
  device_type:
    commands:
      - command: "show lldp info local-device"
        parser: "ttp"
        jpath: "[0].model"
        iterable_type: "str"
  mgmt_interface:
    commands:
      - command: "show ip"
        parser: "textfsm"
        jpath: "[?ip_address=='{{ obj }}'].vlan_name"
  mask_length:
    commands:
      - command: "show ip"
        parser: "textfsm"
        jpath: "[?ip_address=='{{ obj }}'].subnet_mask"
        post_processor: "{{ obj[0] | netmask_to_cidr }}"
        iterable_type: "int"
