sudo -u nautobot bash << 'EOF'
cd /opt/nautobot/git/github_nautobot_day2

cat > onboarding_command_mappers/hp_procurve.yml << 'YAML'
---
sync_devices:
  hostname:
    commands:
      - command: "show system"
        parser: "textfsm"
        jpath: "[*].name"
  serial:
    commands:
      - command: "show system | include Serial"
        parser: "regex"
        jpath: "Serial Number\s+:\s+(\S+)"
  device_type:
    commands:
      - command: "show lldp info local-device"
        parser: "regex"
        jpath: "System Description\s+:\s+Aruba\s+(\S+)"
  mgmt_interface:
    commands:
      - command: "show ip"
        parser: "textfsm"
        jpath: "[?ip_address=='{{ obj }}'].vlan_name"
  mask_length:
    commands:
      - command: "show ip"
        parser: "textfsm"
        jpath: "[?ip_address=='{{ obj }}'].subnet_mask"
        post_processor: "{{ obj[0] | netmask_to_cidr }}"
        iterable_type: "int"
YAML

git add .
git commit -m "Fix regex escaping in hp_procurve mapper"
git push origin main
echo "Done: $?"
EOF
