name: nautobot-day2-test

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: nautobot
      POSTGRES_USER: nautobot
      POSTGRES_PASSWORD: ${NAUTOBOT_DB_PASSWORD:-nautobot_test_pw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nautobot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${NAUTOBOT_REDIS_PASSWORD:-redis_test_pw}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${NAUTOBOT_REDIS_PASSWORD:-redis_test_pw} ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  volume-init:
    build:
      context: ../..
      dockerfile: deploy/single-server/Dockerfile
    user: root
    volumes:
      - nautobot_media:/opt/nautobot/media
      - tenants_data:/opt/nautobot/nautobot_day2_tenants
    entrypoint: ["chown", "-R", "nautobot:nautobot", "/opt/nautobot/media", "/opt/nautobot/nautobot_day2_tenants"]
    restart: "no"

  nautobot:
    build:
      context: ../..
      dockerfile: deploy/single-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    environment: &nautobot_env
      NAUTOBOT_SECRET_KEY: ${NAUTOBOT_SECRET_KEY:-please-change-me-this-is-a-test-key}
      NAUTOBOT_ALLOWED_HOSTS: "*"
      NAUTOBOT_DB_HOST: postgres
      NAUTOBOT_DB_NAME: nautobot
      NAUTOBOT_DB_USER: nautobot
      NAUTOBOT_DB_PASSWORD: ${NAUTOBOT_DB_PASSWORD:-nautobot_test_pw}
      NAUTOBOT_REDIS_HOST: redis
      NAUTOBOT_REDIS_PASSWORD: ${NAUTOBOT_REDIS_PASSWORD:-redis_test_pw}
      NAUTOBOT_CREATE_SUPERUSER: "true"
      NAUTOBOT_SUPERUSER_NAME: ${NAUTOBOT_SUPERUSER_NAME:-admin}
      NAUTOBOT_SUPERUSER_EMAIL: ${NAUTOBOT_SUPERUSER_EMAIL:-admin@example.com}
      NAUTOBOT_SUPERUSER_PASSWORD: ${NAUTOBOT_SUPERUSER_PASSWORD:-admin}
      NAUTOBOT_SUPERUSER_API_TOKEN: ${NAUTOBOT_SUPERUSER_API_TOKEN:-0123456789abcdef0123456789abcdef01234567}
      NAUTOBOT_DAY2_TENANTS_DIR: /opt/nautobot/nautobot_day2_tenants
      BAO_ADDR: "http://openbao:8200"
      BAO_ROLE_ID: "b85e4c02-4b8d-48f4-2e63-4f3aaf2fb290"
      BAO_SECRET_ID: "${BAO_SECRET_ID}"
    volumes:
      - ./nautobot_config.py:/opt/nautobot/nautobot_config.py:ro
      - nautobot_media:/opt/nautobot/media
      - tenants_data:/opt/nautobot/nautobot_day2_tenants
    ports:
      - "8080:8080"
    command: nautobot-server runserver 0.0.0.0:8080 --insecure
    healthcheck:
      test: ["CMD-SHELL", "nautobot-server health_check"]
      interval: 60s
      timeout: 45s
      retries: 3
      start_period: 300s
    restart: unless-stopped

  nautobot-worker:
    build:
      context: ../..
      dockerfile: deploy/single-server/Dockerfile
    depends_on:
      - nautobot
      - volume-init
    environment:
      <<: *nautobot_env
      NAUTOBOT_URL: http://nautobot:8080
      NAUTOBOT_TOKEN: ${NAUTOBOT_SUPERUSER_API_TOKEN:-0123456789abcdef0123456789abcdef01234567}
    volumes:
      - ./nautobot_config.py:/opt/nautobot/nautobot_config.py:ro
      - tenants_data:/opt/nautobot/nautobot_day2_tenants
    # Single-server test: one worker covers both queues. Split this into two
    # services (see README) once you move to separate worker machines.
    command: nautobot-server celery worker -l info -Q default,nautobot_day2_sync
    healthcheck:
      test: ["CMD-SHELL", "nautobot-server health_check"]
      interval: 60s
      timeout: 45s
      retries: 3
      start_period: 300s
    restart: unless-stopped

  upload-app:
    build:
      context: ../..
      dockerfile: deploy/single-server/Dockerfile
    depends_on:
      nautobot:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    environment:
      NAUTOBOT_URL: http://nautobot:8080
      NAUTOBOT_TOKEN: ${NAUTOBOT_SUPERUSER_API_TOKEN:-0123456789abcdef0123456789abcdef01234567}
      NAUTOBOT_DAY2_TENANTS_DIR: /opt/nautobot/nautobot_day2_tenants
    volumes:
      - tenants_data:/opt/nautobot/nautobot_day2_tenants
    ports:
      - "8081:8081"
    entrypoint: []
    command: ["python3", "/source/nautobot-day2/nautobot_day2/onboarding/upload_app.py", "--port", "8081"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  agent-broker:
    build:
      context: ../..
      dockerfile: deploy/single-server/Dockerfile
    depends_on:
      nautobot:
        condition: service_healthy
      openbao:
        condition: service_healthy
    environment:
      NAUTOBOT_URL: http://nautobot:8080
      NAUTOBOT_TOKEN: ${NAUTOBOT_SUPERUSER_API_TOKEN:-0123456789abcdef0123456789abcdef01234567}
      BAO_ADDR: "http://openbao:8200"
      BAO_ROLE_ID: "b46357d7-d0e9-60b3-c73d-fe472233edd2"
      BAO_SECRET_ID: "${BAO_BROKER_SECRET_ID}"
    volumes:
      - tenants_data:/opt/nautobot/nautobot_day2_tenants
    ports:
      - "8082:8082"
    entrypoint: []
    command: ["python3", "/source/nautobot-day2/nautobot_day2/broker/api_server.py", "--port", "8082"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  agent-broker-mcp:
    build:
      context: ../..
      dockerfile: deploy/single-server/Dockerfile
    depends_on:
      nautobot:
        condition: service_healthy
      openbao:
        condition: service_healthy
    environment:
      NAUTOBOT_URL: http://nautobot:8080
      NAUTOBOT_TOKEN: ${NAUTOBOT_SUPERUSER_API_TOKEN:-0123456789abcdef0123456789abcdef01234567}
      BAO_ADDR: "http://openbao:8200"
      BAO_ROLE_ID: "b46357d7-d0e9-60b3-c73d-fe472233edd2"
      BAO_SECRET_ID: "${BAO_BROKER_SECRET_ID}"
    volumes:
      - tenants_data:/opt/nautobot/nautobot_day2_tenants
    ports:
      - "8090:8090"
    entrypoint: []
    command: ["python3", "/source/nautobot-day2/nautobot_day2/broker/mcp_server.py"]
    healthcheck:
      disable: true
    restart: unless-stopped

  openbao:
    image: openbao/openbao:latest
    command: ["server"]
    cap_add:
      - IPC_LOCK
    environment:
      BAO_LOCAL_CONFIG: |
        storage "file" {
          path = "/openbao/data"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        disable_mlock = true
    ports:
      - "8200:8200"
    volumes:
      - openbao_data:/openbao/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
  nautobot_media:
  tenants_data:
  openbao_data:
